<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spider-OvO Parkour</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; background: #fafafa; margin: 20px auto; border: 4px solid #333; box-shadow: 10px 10px 0px #ff0055; }
        .ui { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 id="levelDisplay">LEVEL 1</h2>
        <p>ARROWS to move | Reach the <span style="color: #ff0055; font-weight: bold;">RED FLAG</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 500;

        let currentLevel = 0;
        const player = { x: 50, y: 400, w: 20, h: 35, vx: 0, vy: 0, speed: 5, jump: -11, grounded: false };
        const gravity = 0.6;
        const friction = 0.85;

        // Level Design: Ensured jumping height (max ~110px) is respected
        const levels = [
            { // Level 1: Basics
                start: { x: 50, y: 400 },
                goal: { x: 700, y: 150 },
                platforms: [
                    { x: 0, y: 450, w: 800, h: 50 },
                    { x: 200, y: 360, w: 150, h: 20 },
                    { x: 400, y: 270, w: 150, h: 20 },
                    { x: 650, y: 180, w: 100, h: 20 }
                ]
            },
            { // Level 2: Zig Zag
                start: { x: 50, y: 400 },
                goal: { x: 50, y: 100 },
                platforms: [
                    { x: 0, y: 450, w: 200, h: 50 },
                    { x: 250, y: 380, w: 150, h: 20 },
                    { x: 450, y: 300, w: 200, h: 20 },
                    { x: 250, y: 220, w: 150, h: 20 },
                    { x: 20, y: 140, w: 100, h: 20 }
                ]
            }
        ];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetPlayer() {
            const lvl = levels[currentLevel];
            player.x = lvl.start.x;
            player.y = lvl.start.y;
            player.vx = 0; player.vy = 0;
        }

        function checkCollision(p, plat) {
            if (p.x < plat.x + plat.w && p.x + p.w > plat.x &&
                p.y < plat.y + plat.h && p.y + p.h > plat.y) {
                
                // Top collision
                if (p.vy > 0 && p.y + p.h - p.vy <= plat.y) {
                    p.y = plat.y - p.h;
                    p.vy = 0;
                    p.grounded = true;
                }
            }
        }

        function update() {
            const lvl = levels[currentLevel];
            
            if (keys['ArrowRight']) { if (player.vx < player.speed) player.vx++; }
            if (keys['ArrowLeft']) { if (player.vx > -player.speed) player.vx--; }
            if (keys['ArrowUp'] && player.grounded) {
                player.vy = player.jump;
                player.grounded = false;
            }

            player.vx *= friction;
            player.vy += gravity;
            player.grounded = false;

            lvl.platforms.forEach(plat => checkCollision(player, plat));

            player.x += player.vx;
            player.y += player.vy;

            // Goal check
            const distToGoal = Math.hypot(player.x - lvl.goal.x, player.y - lvl.goal.y);
            if (distToGoal < 30) {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    alert("YOU BEAT THE GAME!");
                    currentLevel = 0;
                }
                document.getElementById('levelDisplay').innerText = "LEVEL " + (currentLevel + 1);
                resetPlayer();
            }

            // Fall off screen reset
            if (player.y > canvas.height) resetPlayer();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const lvl = levels[currentLevel];

            // Draw Platforms (Drawn style)
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 3;
            lvl.platforms.forEach(p => {
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#eee";
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            // Draw Goal Flag
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(lvl.goal.x, lvl.goal.y, 10, 40);
            ctx.beginPath();
            ctx.moveTo(lvl.goal.x + 10, lvl.goal.y);
            ctx.lineTo(lvl.goal.x + 35, lvl.goal.y + 10);
            ctx.lineTo(lvl.goal.x + 10, lvl.goal.y + 20);
            ctx.fill();

            // Draw Player (Spider-Verse Glitch Style)
            // Blue offset
            ctx.fillStyle = "rgba(0, 255, 255, 0.7)";
            ctx.fillRect(player.x - 2, player.y, player.w, player.h);
            // Red offset
            ctx.fillStyle = "rgba(255, 0, 85, 0.7)";
            ctx.fillRect(player.x + 2, player.y, player.w, player.h);
            // Main Body
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        resetPlayer();
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spider-OvO: Multiverse Parkour</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #ffffff; border: 5px solid #000; box-shadow: 8px 8px 0px #00f2ff, -8px -8px 0px #ff0055; cursor: none; }
        .ui { text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #levelDisplay { font-size: 28px; color: #ff0055; margin: 0; text-shadow: 2px 2px #00f2ff; }
        p { color: #333; font-weight: bold; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 id="levelDisplay">LEVEL 1</h2>
        <p>ARROWS TO MOVE | REACH THE FLAG</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 500;

        let currentLevel = 0;
        const player = { x: 50, y: 400, w: 20, h: 30, vx: 0, vy: 0, speed: 4.8, jump: -12, grounded: false };
        const gravity = 0.6;
        const friction = 0.82;

        const levels = [
            { // Level 1: Intro
                start: { x: 50, y: 400 },
                goal: { x: 720, y: 150 },
                platforms: [
                    { x: 0, y: 450, w: 300, h: 50 },
                    { x: 350, y: 380, w: 150, h: 20 },
                    { x: 550, y: 290, w: 150, h: 20 },
                    { x: 700, y: 210, w: 80, h: 20 }
                ]
            },
            { // Level 2: The Climb
                start: { x: 50, y: 400 },
                goal: { x: 70, y: 100 },
                platforms: [
                    { x: 0, y: 450, w: 150, h: 50 },
                    { x: 200, y: 380, w: 120, h: 20 },
                    { x: 400, y: 310, w: 120, h: 20 },
                    { x: 250, y: 230, w: 100, h: 20 },
                    { x: 50, y: 160, w: 100, h: 20 }
                ]
            },
            { // Level 3: Long Jumps
                start: { x: 30, y: 400 },
                goal: { x: 750, y: 400 },
                platforms: [
                    { x: 0, y: 450, w: 100, h: 50 },
                    { x: 180, y: 380, w: 70, h: 20 },
                    { x: 360, y: 310, w: 70, h: 20 },
                    { x: 540, y: 380, w: 70, h: 20 },
                    { x: 700, y: 450, w: 100, h: 50 }
                ]
            },
            { // Level 4: The Drop
                start: { x: 50, y: 50 },
                goal: { x: 720, y: 410 },
                platforms: [
                    { x: 20, y: 120, w: 100, h: 20 },
                    { x: 180, y: 180, w: 100, h: 20 },
                    { x: 350, y: 250, w: 100, h: 20 },
                    { x: 520, y: 330, w: 100, h: 20 },
                    { x: 680, y: 460, w: 120, h: 40 }
                ]
            },
            { // Level 5: Final Precision
                start: { x: 400, y: 400 },
                goal: { x: 400, y: 60 },
                platforms: [
                    { x: 350, y: 460, w: 100, h: 40 },
                    { x: 550, y: 380, w: 50, h: 20 },
                    { x: 380, y: 300, w: 50, h: 20 },
                    { x: 200, y: 220, w: 50, h: 20 },
                    { x: 380, y: 120, w: 50, h: 20 }
                ]
            }
        ];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetPlayer() {
            const lvl = levels[currentLevel];
            player.x = lvl.start.x;
            player.y = lvl.start.y;
            player.vx = 0; player.vy = 0;
        }

        function update() {
            const lvl = levels[currentLevel];
            
            if (keys['ArrowRight']) { if (player.vx < player.speed) player.vx += 0.8; }
            if (keys['ArrowLeft']) { if (player.vx > -player.speed) player.vx -= 0.8; }
            if (keys['ArrowUp'] && player.grounded) {
                player.vy = player.jump;
                player.grounded = false;
            }

            player.vx *= friction;
            player.vy += gravity;
            player.grounded = false;

            lvl.platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.w > plat.x &&
                    player.y < plat.y + plat.h && player.y + player.h > plat.y) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= plat.y) {
                        player.y = plat.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            });

            player.x += player.vx;
            player.y += player.vy;

            // Goal check
            const dist = Math.hypot((player.x + 10) - lvl.goal.x, (player.y + 15) - lvl.goal.y);
            if (dist < 40) {
                currentLevel++;
                if (currentLevel >= levels.length) {
                    alert("YOU SAVED THE MULTIVERSE!");
                    currentLevel = 0;
                }
                document.getElementById('levelDisplay').innerText = "LEVEL " + (currentLevel + 1);
                resetPlayer();
            }

            if (player.y > canvas.height) resetPlayer();

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const lvl = levels[currentLevel];

            // Draw Platforms
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 4;
            lvl.platforms.forEach(p => {
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#fff";
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            // Draw Goal Flag
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(lvl.goal.x, lvl.goal.y, 6, 40);
            ctx.beginPath();
            ctx.moveTo(lvl.goal.x + 6, lvl.goal.y);
            ctx.lineTo(lvl.goal.x + 30, lvl.goal.y + 12);
            ctx.lineTo(lvl.goal.x + 6, lvl.goal.y + 24);
            ctx.fill();

            // Spider-Verse Glitch Logic
            let glitch = (Math.random() > 0.9) ? (Math.random() - 0.5) * 10 : 0;

            ctx.globalAlpha = 0.5;
            ctx.fillStyle = "#00f2ff"; // Cyan offset
            ctx.fillRect(player.x - 4 + glitch, player.y, player.w, player.h);
            ctx.fillStyle = "#ff0055"; // Magenta offset
            ctx.fillRect(player.x + 4 - glitch, player.y, player.w, player.h);
            
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // OvO Eyes
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x + 4, player.y + 6, 4, 4);
            ctx.fillRect(player.x + 12, player.y + 6, 4, 4);
        }

        resetPlayer();
        update();
    </script>
</body>
</html>
